<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Video Meeting</title>
    <!-- Tailwind CSS for UI Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .gradient-btn {
            background: linear-gradient(90deg, #800020 0%, #002280 100%);
            border: 1px solid #ffffffaa;
            transition: transform 0.2s;
        }
        .gradient-btn:hover {
            transform: scale(1.02);
        }
        video {
            transform: rotateY(180deg);
            object-fit: cover;
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-between overflow-hidden">

    <!-- 1. SETUP SECTION (Admin / Employee Entry) -->
    <div id="setup-container" class="flex-grow flex flex-col md:flex-row items-center justify-center p-6 gap-8">
        
        <!-- Admin Block -->
        <div id="admin-panel" class="w-full max-w-md p-8 border border-gray-800 rounded-lg bg-black text-center">
            <h1 class="text-3xl font-serif mb-8 text-gray-200">Admin</h1>
            <div class="border border-white p-4 rounded-sm flex items-center mb-6">
                <span class="text-gray-400 mr-2 whitespace-nowrap">Room Name:</span>
                <input type="text" id="room-input" class="bg-transparent border-none outline-none text-white w-full" placeholder="Enter here...">
            </div>
            <button id="create-btn" class="w-full bg-white text-black py-2 font-semibold hover:bg-gray-200 transition">
                Create Room & Get Link
            </button>
            
            <!-- Invite Link Display -->
            <div id="invite-box" class="mt-6 hidden">
                <p class="text-sm text-gray-400 mb-2">Share this link with participants:</p>
                <div class="flex items-center bg-gray-900 p-2 rounded border border-gray-700">
                    <input type="text" id="share-link-input" readonly class="bg-transparent text-xs text-gray-300 w-full outline-none">
                    <button id="copy-btn" class="ml-2 text-blue-400 hover:text-blue-300 text-sm">Copy</button>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div id="divider-line" class="hidden md:block h-64 w-px bg-gray-800"></div>

        <!-- Employee Block -->
        <div id="employee-panel" class="w-full max-w-md p-8 border border-gray-800 rounded-lg bg-black text-center">
            <h1 class="text-3xl font-serif mb-8 text-gray-200">Employee</h1>
            <button id="join-btn" class="gradient-btn w-full py-4 px-6 rounded text-white text-lg font-medium shadow-lg">
                Join the meeting
            </button>
            <p id="room-status-text" class="text-sm text-gray-500 mt-4">No active room URL detected. Please use an admin link or create one.</p>
        </div>
    </div>

    <!-- 2. MEETING IN PROGRESS SCREEN -->
    <div id="meeting-container" class="hidden flex-grow flex-col h-full relative">
        <!-- Title bar -->
        <div class="p-4 bg-gray-950 border-b border-gray-900 flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-300">Meeting in progress: <span id="active-room-name" class="text-blue-400"></span></h2>
            <div class="text-sm text-gray-400" id="participant-count">Participants: 1</div>
        </div>

        <!-- Video Grid -->
        <div class="flex-grow p-6 overflow-y-auto">
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 auto-rows-[200px]">
                <!-- Local video container -->
                <div class="relative bg-gray-900 rounded-lg overflow-hidden border border-gray-800">
                    <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
                    <div class="absolute bottom-2 left-2 bg-black bg-opacity-60 px-2 py-1 rounded text-xs">You (Admin/Employee)</div>
                </div>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="p-4 bg-gray-950 border-t border-gray-900 flex justify-center items-center gap-6">
            <button id="toggle-mic" class="w-12 h-12 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition">
                <i class="fa-solid fa-microphone text-white"></i>
            </button>
            <button id="toggle-video" class="w-12 h-12 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center transition">
                <i class="fa-solid fa-video text-white"></i>
            </button>
            <button id="leave-btn" class="w-12 h-12 rounded-full bg-red-600 hover:bg-red-700 flex items-center justify-center transition">
                <i class="fa-solid fa-phone-slash text-white"></i>
            </button>
        </div>
    </div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, onChildRemoved, remove, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBCpqt6OVooTsN__jWBlqbphaSVfkZDjR0",
            authDomain: "flawless-parity-486609-t3.firebaseapp.com",
            databaseURL: "https://flawless-parity-486609-t3-default-rtdb.firebaseio.com",
            projectId: "flawless-parity-486609-t3",
            storageBucket: "flawless-parity-486609-t3.firebasestorage.app",
            messagingSenderId: "121220208254",
            appId: "1:121220208254:web:bae0698f231f0881da6a2f",
            measurementId: "G-TY1D29X4JL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // STUN servers for WebRTC
        const iceServers = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" }
            ]
        };

        let localStream;
        let peerConnections = {}; // Stores peerConnection and its candidate queue
        let myId = Math.random().toString(36).substring(2, 15);
        let roomId = "";
        let isMicOn = true;
        let isVideoOn = true;

        const setupContainer = document.getElementById("setup-container");
        const meetingContainer = document.getElementById("meeting-container");
        const roomInput = document.getElementById("room-input");
        const createBtn = document.getElementById("create-btn");
        const joinBtn = document.getElementById("join-btn");
        const inviteBox = document.getElementById("invite-box");
        const shareLinkInput = document.getElementById("share-link-input");
        const copyBtn = document.getElementById("copy-btn");
        const videoGrid = document.getElementById("video-grid");
        const localVideo = document.getElementById("local-video");
        const roomStatusText = document.getElementById("room-status-text");
        const activeRoomNameDisplay = document.getElementById("active-room-name");
        const participantCount = document.getElementById("participant-count");

        const toggleMicBtn = document.getElementById("toggle-mic");
        const toggleVideoBtn = document.getElementById("toggle-video");
        const leaveBtn = document.getElementById("leave-btn");

        const urlParams = new URLSearchParams(window.location.search);
        const queryRoomId = urlParams.get('room');

        if (queryRoomId) {
            roomId = queryRoomId;
            roomStatusText.innerText = `You are invited to join room: ${roomId}`;
            document.getElementById("admin-panel").classList.add("hidden");
            document.getElementById("divider-line").classList.add("hidden");
        }

        createBtn.addEventListener("click", () => {
            const inputVal = roomInput.value.trim();
            if (!inputVal) {
                alert("Please enter a room name");
                return;
            }
            roomId = encodeURIComponent(inputVal);
            const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            shareLinkInput.value = inviteUrl;
            inviteBox.classList.remove("hidden");
        });

        copyBtn.addEventListener("click", () => {
            shareLinkInput.select();
            document.execCommand("copy");
            copyBtn.innerText = "Copied!";
            setTimeout(() => { copyBtn.innerText = "Copy"; }, 2000);
        });

        joinBtn.addEventListener("click", async () => {
            if (!roomId) {
                alert("No active meeting room found.");
                return;
            }
            await startMeeting();
        });

        async function startMeeting() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
            } catch (error) {
                console.error("Error accessing camera/microphone:", error);
                alert("Could not access camera or microphone. Please check browser permissions.");
                return;
            }

            setupContainer.classList.add("hidden");
            meetingContainer.classList.remove("hidden");
            meetingContainer.classList.add("flex");
            activeRoomNameDisplay.innerText = decodeURIComponent(roomId);

            const userRef = ref(db, `rooms/${roomId}/users/${myId}`);
            set(userRef, { id: myId, joinedAt: Date.now() });

            // Automatically remove presence on disconnect
            onDisconnect(userRef).remove();

            const usersRef = ref(db, `rooms/${roomId}/users`);
            onChildAdded(usersRef, (snapshot) => {
                const newUser = snapshot.val();
                if (newUser.id !== myId) {
                    initiateCall(newUser.id);
                }
            });

            onChildRemoved(usersRef, (snapshot) => {
                const leftUser = snapshot.val();
                removePeerConnection(leftUser.id);
            });

            const signalsRef = ref(db, `rooms/${roomId}/signals/${myId}`);
            onChildAdded(signalsRef, async (snapshot) => {
                const signal = snapshot.val();
                if (signal.sender !== myId) {
                    await handleIncomingSignal(signal, snapshot.key);
                }
            });

            onValue(usersRef, (snapshot) => {
                if(snapshot.exists()) {
                    const count = Object.keys(snapshot.val()).length;
                    participantCount.innerText = `Participants: ${count}`;
                }
            });
        }

        // Setup RTCPeerConnection with ICE Candidate Queue
        function setupPeerConnection(remoteId) {
            const pc = new RTCPeerConnection(iceServers);
            
            // peer info holding PC object and ICE Candidate queue
            peerConnections[remoteId] = {
                pc: pc,
                iceQueue: []
            };

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // Handles track arrival (Video/Audio) robustly
            pc.ontrack = (event) => {
                let remoteVideo = document.getElementById(`video-${remoteId}`);
                if (!remoteVideo) {
                    const container = document.createElement("div");
                    container.id = `container-${remoteId}`;
                    container.className = "relative bg-gray-900 rounded-lg overflow-hidden border border-gray-800";

                    remoteVideo = document.createElement("video");
                    remoteVideo.id = `video-${remoteId}`;
                    remoteVideo.autoplay = true;
                    remoteVideo.playsInline = true;
                    remoteVideo.className = "w-full h-full object-cover";
                    
                    // Fallback track rendering
                    if (event.streams && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    } else {
                        const inboundStream = new MediaStream();
                        inboundStream.addTrack(event.track);
                        remoteVideo.srcObject = inboundStream;
                    }

                    // Mobile Autoplay safeguard
                    remoteVideo.onloadedmetadata = () => {
                        remoteVideo.play().catch(e => console.log("Autoplay interrupted:", e));
                    };

                    const label = document.createElement("div");
                    label.className = "absolute bottom-2 left-2 bg-black bg-opacity-60 px-2 py-1 rounded text-xs";
                    label.innerText = `Participant`;

                    container.appendChild(remoteVideo);
                    container.appendChild(label);
                    videoGrid.appendChild(container);
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal(remoteId, {
                        type: "candidate",
                        candidate: JSON.stringify(event.candidate)
                    });
                }
            };

            return pc;
        }

        async function initiateCall(remoteId) {
            const pc = setupPeerConnection(remoteId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            sendSignal(remoteId, {
                type: "offer",
                sdp: offer.sdp
            });
        }

        function sendSignal(remoteId, data) {
            const targetSignalsRef = ref(db, `rooms/${roomId}/signals/${remoteId}`);
            const newSignalRef = push(targetSignalsRef);
            set(newSignalRef, {
                ...data,
                sender: myId,
                timestamp: Date.now()
            });
        }

        // Process stored ICE candidates once connection setup is ready
        async function processIceQueue(peerObj) {
            const pc = peerObj.pc;
            while (peerObj.iceQueue.length > 0) {
                const candidateData = peerObj.iceQueue.shift();
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidateData));
                } catch (e) {
                    console.error("Error adding queued ice candidate:", e);
                }
            }
        }

        async function handleIncomingSignal(signal, signalKey) {
            const remoteId = signal.sender;
            let peerObj = peerConnections[remoteId];

            if (!peerObj) {
                setupPeerConnection(remoteId);
                peerObj = peerConnections[remoteId];
            }

            const pc = peerObj.pc;

            if (signal.type === "offer") {
                await pc.setRemoteDescription(new RTCSessionDescription({ type: "offer", sdp: signal.sdp }));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                sendSignal(remoteId, {
                    type: "answer",
                    sdp: answer.sdp
                });

                // Process queued candidates now that remote description is set
                await processIceQueue(peerObj);

            } else if (signal.type === "answer") {
                await pc.setRemoteDescription(new RTCSessionDescription({ type: "answer", sdp: signal.sdp }));
                await processIceQueue(peerObj);

            } else if (signal.type === "candidate") {
                const candidateData = JSON.parse(signal.candidate);
                if (pc.remoteDescription && pc.remoteDescription.type) {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(candidateData));
                    } catch (e) {
                        console.error("Error adding direct ice candidate:", e);
                    }
                } else {
                    // Queue candidate if remote description is not ready yet
                    peerObj.iceQueue.push(candidateData);
                }
            }

            // Clean signaling node to prevent database bloating
            const processedSignalRef = ref(db, `rooms/${roomId}/signals/${myId}/${signalKey}`);
            remove(processedSignalRef);
        }

        function removePeerConnection(remoteId) {
            if (peerConnections[remoteId]) {
                peerConnections[remoteId].pc.close();
                delete peerConnections[remoteId];
            }
            const videoElem = document.getElementById(`container-${remoteId}`);
            if (videoElem) {
                videoElem.remove();
            }
        }

        toggleMicBtn.addEventListener("click", () => {
            isMicOn = !isMicOn;
            localStream.getAudioTracks()[0].enabled = isMicOn;
            toggleMicBtn.innerHTML = isMicOn ? 
                `<i class="fa-solid fa-microphone text-white"></i>` : 
                `<i class="fa-solid fa-microphone-slash text-red-500"></i>`;
            toggleMicBtn.classList.toggle("bg-gray-800", isMicOn);
            toggleMicBtn.classList.toggle("bg-red-900", !isMicOn);
        });

        toggleVideoBtn.addEventListener("click", () => {
            isVideoOn = !isVideoOn;
            localStream.getVideoTracks()[0].enabled = isVideoOn;
            toggleVideoBtn.innerHTML = isVideoOn ? 
                `<i class="fa-solid fa-video text-white"></i>` : 
                `<i class="fa-solid fa-video-slash text-red-500"></i>`;
            toggleVideoBtn.classList.toggle("bg-gray-800", isVideoOn);
            toggleVideoBtn.classList.toggle("bg-red-900", !isVideoOn);
        });

        function leaveMeeting() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (roomId) {
                remove(ref(db, `rooms/${roomId}/users/${myId}`));
            }
            Object.keys(peerConnections).forEach(remoteId => {
                removePeerConnection(remoteId);
            });
            window.location.href = window.location.origin + window.location.pathname;
        }

        leaveBtn.addEventListener("click", leaveMeeting);
    </script>
</body>
</html>
